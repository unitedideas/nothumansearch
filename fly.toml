app = 'nothumansearch'
primary_region = 'sjc'

[build]

[env]
  PORT = '8091'
  APP_ROOT = '/app'

[http_service]
  internal_port = 8091
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "5s"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
